<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semua Event di Bandung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/event.css">
</head>

<body>

    <div class="lantern-field" aria-hidden="true"></div>

    <header class="topbar">
        <div class="topbar__inner">
            <div class="crumbs">
                <span>Beranda</span>
                <span class="crumbs__sep">/</span>
                <span class="crumbs__current">Semua Event</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <svg class="hero__skyline" viewBox="0 0 1400 260" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <linearGradient id="skyfade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0b1330" stop-opacity="0"/>
        <stop offset="100%" stop-color="#0b1330" stop-opacity="1"/>
      </linearGradient>
    </defs>
    <g fill="#182253">
      <rect x="20" y="120" width="60" height="140"/>
      <rect x="95" y="80" width="45" height="180"/>
      <rect x="150" y="150" width="70" height="110"/>
      <rect x="235" y="60" width="40" height="200"/>
      <rect x="290" y="110" width="55" height="150"/>
      <rect x="360" y="40" width="34" height="220"/>
      <rect x="410" y="130" width="80" height="130"/>
      <rect x="510" y="90" width="46" height="170"/>
      <rect x="570" y="20" width="30" height="240"/>
      <rect x="615" y="140" width="65" height="120"/>
      <rect x="700" y="70" width="50" height="190"/>
      <rect x="765" y="115" width="70" height="145"/>
      <rect x="850" y="45" width="36" height="215"/>
      <rect x="900" y="150" width="60" height="110"/>
      <rect x="975" y="95" width="46" height="165"/>
      <rect x="1035" y="15" width="30" height="245"/>
      <rect x="1080" y="135" width="75" height="125"/>
      <rect x="1170" y="75" width="48" height="185"/>
      <rect x="1235" y="120" width="60" height="140"/>
      <rect x="1310" y="55" width="40" height="205"/>
    </g>
    <path d="M0 190 L120 150 L220 195 L340 130 L460 200 L600 145 L740 195 L880 155 L1020 205 L1160 150 L1280 190 L1400 160 L1400 260 L0 260 Z" fill="#101a42"/>
    <rect x="0" y="0" width="1400" height="260" fill="url(#skyfade)"/>
  </svg>
        <div class="hero__lights" id="heroLights" aria-hidden="true"></div>

        <div class="hero__content">
            <h1 class="hero__title">Semua Event di <span>Bandung</span></h1>
            <p class="hero__subtitle">Temukan berbagai event menarik di Bandung, dari budaya, musik, kuliner, hingga teknologi.</p>

            <div class="searchbar">
                <div class="searchbar__field">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" placeholder="Cari event, nama acara, atau lokasi...">
                </div>

                <div class="sortbox" id="sortbox">
                    <button class="sortbox__trigger" id="sortTrigger" aria-haspopup="listbox" aria-expanded="false">
          <span id="sortLabel">Tanggal Terdekat</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
                    <ul class="sortbox__menu" id="sortMenu" role="listbox">
                        <li role="option" data-value="terdekat">Tanggal Terdekat</li>
                        <li role="option" data-value="terjauh">Tanggal Terjauh</li>
                        <li role="option" data-value="populer">Event Populer</li>
                        <li role="option" data-value="rating">Rating Tertinggi</li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <main class="layout">
        <div class="layout__inner">

            <aside class="sidebar">
                <div class="panel">
                    <div class="panel__head">
                        <h2>Filter Event</h2>
                        <button class="reset-btn" id="resetFilters">Reset</button>
                    </div>

                    <div class="filter-group">
                        <h3 class="filter-group__title">Kategori</h3>
                        <label class="check-row">
            <input type="checkbox" data-cat="semua" checked>
            <span class="check-box"></span>
            <span>Semua Kategori</span>
          </label>
                        <label class="check-row">
            <input type="checkbox" data-cat="budaya">
            <span class="check-box"></span>
            <span class="check-icon">🎭</span><span>Budaya</span>
          </label>
                        <label class="check-row">
            <input type="checkbox" data-cat="musik">
            <span class="check-box"></span>
            <span class="check-icon">🎵</span><span>Musik</span>
          </label>
                        <label class="check-row">
            <input type="checkbox" data-cat="kuliner">
            <span class="check-box"></span>
            <span class="check-icon">🍜</span><span>Kuliner</span>
          </label>
                        <label class="check-row">
            <input type="checkbox" data-cat="teknologi">
            <span class="check-box"></span>
            <span class="check-icon">💻</span><span>Teknologi</span>
          </label>
                        <label class="check-row">
            <input type="checkbox" data-cat="olahraga">
            <span class="check-box"></span>
            <span class="check-icon">🏃</span><span>Olahraga</span>
          </label>
                        <label class="check-row">
            <input type="checkbox" data-cat="edukasi">
            <span class="check-box"></span>
            <span class="check-icon">📚</span><span>Edukasi</span>
          </label>
                        <label class="check-row">
            <input type="checkbox" data-cat="seni">
            <span class="check-box"></span>
            <span class="check-icon">🖼️</span><span>Seni &amp; Kreatif</span>
          </label>
                        <label class="check-row">
            <input type="checkbox" data-cat="komunitas">
            <span class="check-box"></span>
            <span class="check-icon">🤝</span><span>Komunitas</span>
          </label>
                    </div>

                    <div class="filter-group">
                        <h3 class="filter-group__title">Tanggal</h3>
                        <input type="date" class="text-input" id="dateFrom">
                    </div>

                    <div class="filter-group">
                        <h3 class="filter-group__title">Lokasi</h3>
                        <select class="text-input" id="locationSelect">
            <option value="">Pilih lokasi</option>
            <option value="Bandung Kota">Bandung Kota</option>
            <option value="Bandung Barat">Bandung Barat</option>
            <option value="Bandung Timur">Bandung Timur</option>
            <option value="Kabupaten Bandung">Kabupaten Bandung</option>
          </select>
                    </div>

                    <div class="filter-group">
                        <h3 class="filter-group__title">Harga Tiket</h3>
                        <label class="radio-row">
            <input type="radio" name="harga" value="gratis">
            <span class="radio-box"></span>
            <span>Gratis</span>
          </label>
                        <label class="radio-row">
            <input type="radio" name="harga" value="berbayar">
            <span class="radio-box"></span>
            <span>Berbayar</span>
          </label>
                    </div>

                    <button class="apply-btn" id="applyFilters">Terapkan Filter</button>
                </div>
            </aside>

            <section class="results">
                <div class="tabs" id="tabs">
                    <button class="tab tab--active" data-cat="semua">Semua</button>
                    <button class="tab" data-cat="budaya">🎭 Budaya</button>
                    <button class="tab" data-cat="musik">🎵 Musik</button>
                    <button class="tab" data-cat="kuliner">🍜 Kuliner</button>
                    <button class="tab" data-cat="teknologi">💻 Teknologi</button>
                    <button class="tab" data-cat="olahraga">🏃 Olahraga</button>
                    <button class="tab" data-cat="edukasi">📚 Edukasi</button>
                    <button class="tab" data-cat="seni">🖼️ Seni</button>
                    <button class="tab" data-cat="komunitas">🤝 Komunitas</button>
                </div>

                <div class="results__count" id="resultsCount">Menampilkan 0 event</div>

                <div class="cards" id="cardsContainer"></div>

                <nav class="pagination" id="pagination" aria-label="Navigasi halaman"></nav>
            </section>

        </div>
    </main>

    <script src="main.js"></script>
</body>

</html>
